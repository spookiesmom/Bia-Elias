<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - Bia & Elias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            /* Degradê vertical equilibrado: Nem tão pesado, nem tão pálido */
            background: linear-gradient(to bottom, 
                #4e6174 0%,    /* Azul horizonte mais definido */
                #d19e8a 40%,   /* Laranja pêssego suave */
                #e8c8b5 75%,   /* Areia quente */
                #f5edd5 100%   /* Creme solar */
            );
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 24px;
            color: #4b3832; /* Voltamos para o marrom café profundo para melhor leitura */
            position: relative;
            overflow-x: hidden;
        }

        /* Camada de Textura de Papel Aquarela */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: multiply;
        }

        /* Camada extra para grão de aquarela */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            opacity: 0.2;
            pointer-events: none;
            z-index: 2;
        }

        /* Pontos de Brilho Sutis (Stardust) */
        .stardust {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
            background-image: 
                radial-gradient(circle, rgba(255, 255, 255, 0.8) 1px, transparent 1px),
                radial-gradient(circle, rgba(255, 255, 255, 0.6) 1.5px, transparent 1.5px),
                radial-gradient(circle, rgba(255, 252, 230, 0.5) 2px, transparent 2px);
            background-size: 550px 550px, 350px 350px, 450px 450px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.6;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
        }

        .font-cursive { font-family: 'Great Vibes', cursive; color: #4b3832; }
        .font-serif { font-family: 'Cinzel', serif; }

        .fade-in {
            animation: fadeIn 2.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-center">

    <div class="stardust"></div>

    <div class="max-w-xl w-full content-wrapper fade-in">
        
        <header class="mb-12">
            <p class="font-serif tracking-[0.4em] text-[10px] md:text-xs uppercase mb-4 opacity-80 font-medium text-[#4b3832]">
                Junte-se a nós para celebrar este momento especial
            </p>
            <p class="font-serif text-[11px] mt-2 tracking-[0.3em] uppercase opacity-70">Ao nascer do sol</p>
        </header>

        <main class="mb-12 flex items-center justify-center gap-4 md:gap-6 flex-wrap">
            <h1 class="font-cursive text-7xl md:text-8xl leading-none drop-shadow-sm">Bia</h1>
            <p class="font-cursive text-5xl md:text-6xl opacity-60 leading-none">&</p>
            <h1 class="font-cursive text-7xl md:text-8xl leading-none drop-shadow-sm">Elias</h1>
        </main>

        <section class="space-y-8 text-[#4b3832]">
            <div class="font-serif py-8 border-y border-[#4b3832]/10">
                <p class="text-3xl md:text-4xl tracking-[0.25em] font-light mb-2">21 DE JUNHO</p>
                <p class="text-[11px] uppercase tracking-[0.5em] opacity-80 font-medium italic text-[#4b3832]">Às 06:00 da manhã</p>
            </div>
            
            <div class="space-y-2">
                <p class="font-bold text-[11px] md:text-xs uppercase tracking-[0.2em]">Praia do Santinho</p>
                <p class="text-[10px] md:text-[11px] opacity-70 uppercase tracking-widest">Canto dos Ingleses — Florianópolis, SC</p>
            </div>
        </section>

        <footer class="mt-16 flex flex-col items-center gap-4">
            <p class="text-[9px] md:text-[10px] uppercase tracking-[0.5em] opacity-60 mb-4 font-medium text-[#4b3832]">
                Contamos com a sua presença
            </p>
            
            <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=Casamento+de+Bia+e+Elias&dates=20260621T090000Z/20260621T150000Z&details=Celebração+ao+nascer+do+sol+na+Praia+do+Santinho!&location=Praia+do+Santinho,+Florianópolis+-+SC" 
               target="_blank"
               class="inline-block w-64 bg-white/50 hover:bg-white text-[#4b3832] font-semibold py-4 rounded-full shadow-sm transition-all hover:scale-105 active:scale-95 uppercase text-[10px] tracking-[0.2em] border border-white/40 backdrop-blur-sm">
                Adicionar à Agenda
            </a>

            <a href="https://www.google.com/maps/search/?api=1&query=-27.451069,-48.371152" 
               target="_blank"
               class="inline-block w-64 bg-transparent hover:bg-white/20 text-[#4b3832] font-medium py-3 rounded-full transition-all hover:scale-105 active:scale-95 uppercase text-[9px] tracking-[0.2em] border border-[#4b3832]/30">
                Como Chegar
            </a>
        </footer>

    </div>

</body>
</html>
